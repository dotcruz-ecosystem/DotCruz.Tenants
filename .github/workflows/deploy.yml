name: Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dotnet-ef Tool
        run: dotnet tool install --global dotnet-ef

      - name: Restore NuGet Packages
        run: dotnet restore

      - name: Build EF Migrations Bundle
        run: |
          dotnet ef migrations bundle \
            --project src/DotCruz.Tenants.Infrastructure \
            --startup-project src/DotCruz.Tenants.Api \
            --self-contained \
            -r linux-x64 \
            -o tenants-bundle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repo Name for Docker
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/DotCruz.Tenants.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}/dotcruz-tenants-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Remote Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ${{ secrets.VPS_TENANTS_DEPLOY_PATH }}

      - name: Copy docker-compose.prod.yml and Migration Bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml,tenants-bundle"
          target: "${{ secrets.VPS_TENANTS_DEPLOY_PATH }}"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_TENANTS_DEPLOY_PATH }}
            
            chmod +x tenants-bundle
            CONNECTION_STG=$(echo "${{ secrets.TENANTS_CONNECTION_STRING }}" | sed 's/Host=dotcruz-postgres/Host=localhost/I')
            ./tenants-bundle --connection "$CONNECTION_STG"
            rm -f tenants-bundle
            
            mv -f docker-compose.prod.yml docker-compose.yml 2>/dev/null || true
            
            cat <<'EOF' > .env
            DOCKER_IMAGE_TAG="ghcr.io/${{ env.REPO_NAME }}/dotcruz-tenants-api:latest"
            TENANTS_CONNECTION_STRING="${{ secrets.TENANTS_CONNECTION_STRING }}"
            CORE_AUTH_BASE_ADDRESS="${{ secrets.CORE_AUTH_BASE_ADDRESS }}"
            JWT_ISSUER="${{ secrets.JWT_ISSUER }}"
            JWT_AUDIENCE="${{ secrets.JWT_AUDIENCE }}"
            JWT_JWKS_URL="${{ secrets.JWT_JWKS_URL }}"
            TENANTS_SERVICE_KEY="${{ secrets.TENANTS_SERVICE_KEY }}"
            EOF
            
            chmod 600 .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose pull
            docker compose up -d
            docker image prune -f
