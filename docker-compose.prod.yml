services:
  tenants-api:
    image: ${DOCKER_IMAGE_TAG}
    container_name: dotcruz-tenants-api
    restart: unless-stopped
    ports:
      - "5052:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${TENANTS_CONNECTION_STRING}
      - CoreAuth__BaseAddress=${CORE_AUTH_BASE_ADDRESS}
      - Settings__Jwt__Issuer=${JWT_ISSUER}
      - Settings__Jwt__Audience=${JWT_AUDIENCE}
      - Settings__Jwt__JwksUrl=${JWT_JWKS_URL}
      - Settings__ServiceAuth__Self__Name=Tenants
      - Settings__ServiceAuth__Self__Key=${TENANTS_SERVICE_KEY}
      - Settings__AWS__Region=${AWS_REGION}
      - Settings__AWS__AccessKey=${AWS_ACCESS_KEY_ID_VPS}
      - Settings__AWS__SecretKey=${AWS_SECRET_ACCESS_KEY_VPS}
      - Settings__AWS__SmtpParameterPath=${AWS_SMTP_PARAMETER_PATH}
    networks:
      - dotcruz_net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  dotcruz_net:
    name: dotcruz_net
    external: true
